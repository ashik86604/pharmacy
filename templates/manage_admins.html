{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

    <h3>Manage Admins</h3>

    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Action</th>
        </tr>

        {% for admin in admins %}
        <tr>
            <td>{{ admin.a_id }}</td>
            <td>{{ admin.admin_name }}</td>
            <td>
                <a href="{{ url_for('delete_admin', a_id=admin.a_id) }}"
                   class="btn btn-danger btn-sm">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
