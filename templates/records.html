{% extends "base.html" %}
{% block content %}

<h3>All Bills</h3>
<hr>

<form method="GET" class="form-inline mb-3">
    <input type="date" name="start_date" class="form-control mr-2">
    <input type="date" name="end_date" class="form-control mr-2">
    <input type="tel" name="phone" class="form-control mr-2" placeholder="Enter Phone Number">
    <button class="btn btn-primary">Filter</button>
</form>

<table class="table table-bordered table-striped">
    <thead class="thead-dark">
        <tr>
            <th>Bill ID</th>
            <th>Phone</th>
            <th>Total Price</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for bill in bills %}
        <tr>
            <td>{{ bill.b_id }}</td>
            <td>{{ bill.c_phone }}</td>
            <td>₹ {{ bill.total_price }}</td>
            <td>{{ bill.created_at }}</td>
            <td>
                <a href="{{ url_for('view_record', bill_id=bill.b_id) }}"
                   class="btn btn-info btn-sm">
                   View
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
